name: Sync Latest Upstream Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get upstream latest release
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          UPSTREAM_REPO=$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.parent.full_name // empty')
          UPSTREAM_CLONE_URL=$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.parent.clone_url // empty')

          if [ -z "$UPSTREAM_REPO" ] || [ -z "$UPSTREAM_CLONE_URL" ]; then
            echo "没有识别到上游仓库。请确认当前仓库是 fork 仓库。"
            exit 1
          fi

          TAG=$(gh api "repos/${UPSTREAM_REPO}/releases/latest" --jq '.tag_name')
          RELEASE_NAME=$(gh api "repos/${UPSTREAM_REPO}/releases/latest" --jq '.name // .tag_name')
          IS_PRERELEASE=$(gh api "repos/${UPSTREAM_REPO}/releases/latest" --jq '.prerelease')
          UPSTREAM_ASSET_COUNT=$(gh api "repos/${UPSTREAM_REPO}/releases/latest" --jq '.assets | length')

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "上游没有 latest release。"
            exit 1
          fi

          echo "上游仓库: $UPSTREAM_REPO"
          echo "上游最新 Release: $TAG"
          echo "上游 assets 数量: $UPSTREAM_ASSET_COUNT"

          echo "upstream_repo=$UPSTREAM_REPO" >> "$GITHUB_OUTPUT"
          echo "upstream_clone_url=$UPSTREAM_CLONE_URL" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "upstream_asset_count=$UPSTREAM_ASSET_COUNT" >> "$GITHUB_OUTPUT"

      - name: Check local tag release and assets
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.info.outputs.tag }}
          UPSTREAM_ASSET_COUNT: ${{ steps.info.outputs.upstream_asset_count }}
        run: |
          set -e

          NEED_SYNC=false

          echo "检查本地 tag: $TAG"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "refs/tags/$TAG"; then
            echo "本地已有 tag: $TAG"
            HAS_TAG=true
          else
            echo "本地没有 tag: $TAG"
            HAS_TAG=false
            NEED_SYNC=true
          fi

          echo "检查本地 Release: $TAG"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "本地已有 Release: $TAG"
            HAS_RELEASE=true

            LOCAL_ASSET_COUNT=$(gh release view "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --json assets \
              --jq '.assets | length')

            echo "本地 assets 数量: $LOCAL_ASSET_COUNT"
            echo "上游 assets 数量: $UPSTREAM_ASSET_COUNT"

            if [ "$UPSTREAM_ASSET_COUNT" -gt 0 ] && [ "$LOCAL_ASSET_COUNT" -lt "$UPSTREAM_ASSET_COUNT" ]; then
              echo "本地 assets 不完整，需要同步。"
              NEED_SYNC=true
            fi
          else
            echo "本地没有 Release: $TAG"
            HAS_RELEASE=false
            LOCAL_ASSET_COUNT=0
            NEED_SYNC=true
          fi

          if [ "$HAS_TAG" = "true" ] && [ "$HAS_RELEASE" = "true" ] && [ "$NEED_SYNC" = "false" ]; then
            echo "tag、Release、assets 都已满足，不需要同步。"
            echo "need_sync=false" >> "$GITHUB_OUTPUT"
          else
            echo "至少有一项不满足，需要同步。"
            echo "need_sync=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if already synced
        if: steps.check.outputs.need_sync == 'false'
        run: |
          echo "最新 tag、Release 和 assets 都已存在，不需要同步。"

      - name: Sync latest tag
        if: steps.check.outputs.need_sync == 'true'
        run: |
          set -e

          TAG="${{ steps.info.outputs.tag }}"
          UPSTREAM_CLONE_URL="${{ steps.info.outputs.upstream_clone_url }}"

          git remote remove upstream 2>/dev/null || true
          git remote add upstream "$UPSTREAM_CLONE_URL"

          echo "同步最新 tag: $TAG"
          git fetch upstream "refs/tags/$TAG:refs/tags/$TAG" --force
          git push origin "refs/tags/$TAG:refs/tags/$TAG" --force

      - name: Download upstream release info and assets
        if: steps.check.outputs.need_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REPO: ${{ steps.info.outputs.upstream_repo }}
          TAG: ${{ steps.info.outputs.tag }}
        run: |
          set -e

          rm -rf /tmp/release-assets
          mkdir -p /tmp/release-assets

          gh release view "$TAG" \
            --repo "$UPSTREAM_REPO" \
            --json body \
            --jq '.body // ""' > /tmp/release-body.md

          echo "下载上游 Release assets: $TAG"

          gh release download "$TAG" \
            --repo "$UPSTREAM_REPO" \
            --dir /tmp/release-assets \
            --clobber

          echo "下载完成："
          ls -lh /tmp/release-assets || true

      - name: Create or update local release
        if: steps.check.outputs.need_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.info.outputs.tag }}
          RELEASE_NAME: ${{ steps.info.outputs.release_name }}
          IS_PRERELEASE: ${{ steps.info.outputs.is_prerelease }}
        run: |
          set -e

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "本地 Release 已存在，更新标题和说明: $TAG"
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_NAME" \
              --notes-file /tmp/release-body.md
          else
            echo "创建本地 Release: $TAG"

            if [ "$IS_PRERELEASE" = "true" ]; then
              gh release create "$TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --title "$RELEASE_NAME" \
                --notes-file /tmp/release-body.md \
                --prerelease
            else
              gh release create "$TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --title "$RELEASE_NAME" \
                --notes-file /tmp/release-body.md
            fi
          fi

      - name: Upload assets to local release
        if: steps.check.outputs.need_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.info.outputs.tag }}
        run: |
          set -e

          if [ -d /tmp/release-assets ] && [ "$(ls -A /tmp/release-assets)" ]; then
            echo "上传 assets 到本地 Release: $TAG"
            gh release upload "$TAG" /tmp/release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            echo "上游 Release 没有 assets。"
          fi
